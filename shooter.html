<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RETRO BLASTER</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000; overflow: hidden;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  canvas {
    width: 800px; height: 600px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: crosshair;
  }
</style>
</head>
<body>
<canvas id="game" width="400" height="300"></canvas>
<script>
// === SECTION A: CONSTANTS & CONFIG ===
const W = 400, H = 300;
const PLAYER_SPEED = 120;
const BULLET_SPEED = 280;
const PLAYER_MAX_HP = 5;
const FIRE_COOLDOWN = 0.15;
const INVULN_TIME = 1.0;
const WAVE_INTRO_DUR = 2.0;
const WAVE_CLEAR_DELAY = 1.5;
const SHAKE_DECAY = 8;

const COL = {
  bg: '#0a0a1a',
  grid: 'rgba(255,255,255,0.04)',
  playerBody: '#2d6a4f',
  playerLight: '#40916c',
  playerHead: '#52b788',
  gun: '#555',
  gunLight: '#777',
  bullet: '#ffd60a',
  bulletTrail: '#fca311',
  enemyBasic: '#c1121f',
  enemyBasicLight: '#e5383b',
  enemyFast: '#f48c06',
  enemyFastLight: '#ffba08',
  enemyTank: '#6a040f',
  enemyTankLight: '#9d0208',
  enemyTankArmor: '#dc2f02',
  hpBar: '#e5383b',
  hpBarBg: '#333',
  cooldownBar: '#4cc9f0',
  text: '#eee',
  textDim: '#888',
  accent: '#7b2cbf',
  gold: '#ffd60a',
};

function getLevelConfig(level) {
  return {
    enemyCount: 5 + level * 3,
    enemySpeed: Math.min(100, 35 + level * 5),
    enemyHp: 1 + Math.floor(level / 3),
    spawnInterval: Math.max(0.3, 1.4 - level * 0.1),
    types: level < 3 ? ['basic'] : level < 6 ? ['basic', 'fast'] : ['basic', 'fast', 'tank'],
  };
}

// === SECTION B: GLOBAL STATE ===
let gameState = 'MENU';
let waveState = 'WAVE_INTRO';
let level = 1, score = 0, highScore = 0;
let waveTimer = 0, spawnTimer = 0, enemiesLeft = 0, enemiesToSpawn = 0;
let screenShake = 0, menuTime = 0;

let player = null;
let bullets = [], enemies = [], particles = [];
let keys = {}, mouseX = W / 2, mouseY = H / 2, mouseDown = false;
let fireCooldown = 0;
let levelConfig = null;

// === SECTION C: INPUT HANDLING ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const scaleX = () => W / canvas.clientWidth;
const scaleY = () => H / canvas.clientHeight;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * scaleX();
  mouseY = (e.clientY - r.top) * scaleY();
});
canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  if (gameState === 'MENU') startGame();
  else if (gameState === 'GAME_OVER') startGame();
});
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// === SECTION D: UTILITY FUNCTIONS ===
function dist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }
function rand(min, max) { return min + Math.random() * (max - min); }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function lerp(a, b, t) { return a + (b - a) * t; }

// === SECTION E: SPRITE DRAWING ===
function drawPlayer(p) {
  const { x, y, angle, invuln } = p;
  if (invuln > 0 && Math.floor(invuln * 10) % 2 === 0) return; // blink

  ctx.save();
  ctx.translate(Math.round(x), Math.round(y));
  ctx.rotate(angle);

  // Gun
  ctx.fillStyle = COL.gun;
  ctx.fillRect(2, -1, 8, 2);
  ctx.fillStyle = COL.gunLight;
  ctx.fillRect(8, -1, 2, 2);

  // Body
  ctx.fillStyle = COL.playerBody;
  ctx.fillRect(-5, -5, 10, 10);
  ctx.fillStyle = COL.playerLight;
  ctx.fillRect(-5, -5, 10, 2);
  ctx.fillRect(-5, -5, 2, 10);

  // Head detail
  ctx.fillStyle = COL.playerHead;
  ctx.fillRect(-3, -3, 6, 6);

  // Eyes (facing right in local coords)
  ctx.fillStyle = '#fff';
  ctx.fillRect(1, -2, 2, 2);
  ctx.fillRect(1, 1, 2, 2);
  ctx.fillStyle = '#000';
  ctx.fillRect(2, -2, 1, 1);
  ctx.fillRect(2, 1, 1, 1);

  ctx.restore();
}

function drawEnemyBasic(e) {
  ctx.save();
  ctx.translate(Math.round(e.x), Math.round(e.y));
  ctx.rotate(e.angle);

  if (e.flashTimer > 0) {
    ctx.fillStyle = '#fff';
  } else {
    ctx.fillStyle = COL.enemyBasic;
  }
  ctx.fillRect(-4, -4, 8, 8);
  if (e.flashTimer <= 0) {
    ctx.fillStyle = COL.enemyBasicLight;
    ctx.fillRect(-4, -4, 8, 2);
  }
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, -2, 2, 2);
  ctx.fillRect(0, 1, 2, 2);

  // Arms
  ctx.fillStyle = e.flashTimer > 0 ? '#fff' : COL.enemyBasic;
  ctx.fillRect(-2, -6, 2, 2);
  ctx.fillRect(-2, 5, 2, 2);

  ctx.restore();
}

function drawEnemyFast(e) {
  ctx.save();
  ctx.translate(Math.round(e.x), Math.round(e.y));
  ctx.rotate(e.angle);

  if (e.flashTimer > 0) {
    ctx.fillStyle = '#fff';
  } else {
    ctx.fillStyle = COL.enemyFast;
  }
  // Triangular-ish body
  ctx.fillRect(-2, -3, 5, 6);
  ctx.fillRect(-3, -2, 7, 4);
  if (e.flashTimer <= 0) {
    ctx.fillStyle = COL.enemyFastLight;
    ctx.fillRect(-2, -3, 5, 2);
  }
  // Eyes
  ctx.fillStyle = '#fff';
  ctx.fillRect(1, -1, 1, 1);
  ctx.fillRect(1, 1, 1, 1);

  ctx.restore();
}

function drawEnemyTank(e) {
  ctx.save();
  ctx.translate(Math.round(e.x), Math.round(e.y));
  ctx.rotate(e.angle);

  if (e.flashTimer > 0) {
    ctx.fillStyle = '#fff';
  } else {
    ctx.fillStyle = COL.enemyTank;
  }
  ctx.fillRect(-6, -6, 12, 12);
  if (e.flashTimer <= 0) {
    ctx.fillStyle = COL.enemyTankLight;
    ctx.fillRect(-6, -6, 12, 3);
    ctx.fillRect(-6, -6, 3, 12);
    // Armor stripes
    ctx.fillStyle = COL.enemyTankArmor;
    ctx.fillRect(-4, -2, 8, 2);
    ctx.fillRect(-4, 2, 8, 2);
  }
  // Eyes
  ctx.fillStyle = '#ff0';
  ctx.fillRect(1, -2, 2, 2);
  ctx.fillRect(1, 1, 2, 2);

  ctx.restore();
}

function drawBullet(b) {
  ctx.save();
  ctx.translate(Math.round(b.x), Math.round(b.y));
  ctx.rotate(b.angle);
  ctx.fillStyle = COL.bullet;
  ctx.fillRect(-2, -1, 4, 2);
  ctx.fillStyle = '#fff';
  ctx.fillRect(0, -1, 2, 2);
  ctx.restore();
}

function drawParticle(p) {
  ctx.globalAlpha = p.life / p.maxLife;
  ctx.fillStyle = p.color;
  ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
  ctx.globalAlpha = 1;
}

// === SECTION F: ENTITY FACTORIES ===
function createPlayer() {
  return {
    x: W / 2, y: H / 2,
    angle: 0, hp: PLAYER_MAX_HP,
    invuln: 0, alive: true,
  };
}

function createBullet(x, y, angle) {
  return {
    x, y, angle,
    vx: Math.cos(angle) * BULLET_SPEED,
    vy: Math.sin(angle) * BULLET_SPEED,
    alive: true, radius: 3,
  };
}

function createEnemy(type, lvlConfig) {
  const side = randInt(0, 3);
  let x, y;
  if (side === 0) { x = rand(0, W); y = -15; }       // top
  else if (side === 1) { x = rand(0, W); y = H + 15; } // bottom
  else if (side === 2) { x = -15; y = rand(0, H); }     // left
  else { x = W + 15; y = rand(0, H); }                   // right

  const angle = Math.atan2(player.y - y, player.x - x);
  const speed = lvlConfig.enemySpeed;
  let hp = lvlConfig.enemyHp;
  let radius = 5;
  let scoreVal = 100;
  let spdMult = 1;

  if (type === 'fast') {
    spdMult = 1.5;
    radius = 4;
    scoreVal = 150;
  } else if (type === 'tank') {
    spdMult = 0.6;
    hp = Math.max(3, hp + 2);
    radius = 7;
    scoreVal = 250;
  }

  const finalSpeed = speed * spdMult;
  return {
    x, y, angle, type, hp, maxHp: hp,
    vx: Math.cos(angle) * finalSpeed,
    vy: Math.sin(angle) * finalSpeed,
    speed: finalSpeed,
    alive: true, radius, scoreVal,
    flashTimer: 0,
  };
}

function spawnParticles(x, y, count, color, speed, size) {
  for (let i = 0; i < count; i++) {
    const a = rand(0, Math.PI * 2);
    const s = rand(speed * 0.3, speed);
    const life = rand(0.15, 0.45);
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      color, size: size || randInt(1, 2),
      life, maxLife: life, alive: true,
    });
  }
}

// === SECTION G: UPDATE LOGIC ===
function update(dt) {
  menuTime += dt;
  if (gameState === 'MENU') return;
  if (gameState === 'GAME_OVER') return;
  if (gameState !== 'PLAYING') return;

  if (waveState === 'WAVE_INTRO') {
    waveTimer -= dt;
    if (waveTimer <= 0) {
      waveState = 'WAVE_ACTIVE';
      levelConfig = getLevelConfig(level);
      enemiesToSpawn = levelConfig.enemyCount;
      enemiesLeft = levelConfig.enemyCount;
      spawnTimer = 0.5;
    }
    return;
  }

  if (waveState === 'WAVE_CLEAR') {
    waveTimer -= dt;
    if (waveTimer <= 0) {
      level++;
      waveState = 'WAVE_INTRO';
      waveTimer = WAVE_INTRO_DUR;
    }
    return;
  }

  // WAVE_ACTIVE
  updatePlayer(dt);
  updateShooting(dt);
  updateBullets(dt);
  updateSpawning(dt);
  updateEnemies(dt);
  handleCollisions();
  updateParticles(dt);

  if (screenShake > 0) screenShake = Math.max(0, screenShake - SHAKE_DECAY * dt);

  // Check wave clear
  if (enemiesToSpawn <= 0 && enemies.length === 0) {
    waveState = 'WAVE_CLEAR';
    waveTimer = WAVE_CLEAR_DELAY;
    score += level * 500;
  }

  // Check death
  if (player.hp <= 0) {
    gameState = 'GAME_OVER';
    if (score > highScore) highScore = score;
    spawnParticles(player.x, player.y, 20, COL.playerHead, 80, 2);
    spawnParticles(player.x, player.y, 15, '#fff', 60, 1);
  }
}

function updatePlayer(dt) {
  let dx = 0, dy = 0;
  if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
  if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
  if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
  if (keys['ArrowDown'] || keys['KeyS']) dy += 1;

  if (dx !== 0 && dy !== 0) {
    dx *= 0.7071;
    dy *= 0.7071;
  }

  player.x = clamp(player.x + dx * PLAYER_SPEED * dt, 8, W - 8);
  player.y = clamp(player.y + dy * PLAYER_SPEED * dt, 8, H - 8);
  player.angle = Math.atan2(mouseY - player.y, mouseX - player.x);

  if (player.invuln > 0) player.invuln -= dt;
}

function updateShooting(dt) {
  fireCooldown = Math.max(0, fireCooldown - dt);
  if (mouseDown && fireCooldown <= 0) {
    const tipX = player.x + Math.cos(player.angle) * 10;
    const tipY = player.y + Math.sin(player.angle) * 10;
    bullets.push(createBullet(tipX, tipY, player.angle));
    fireCooldown = FIRE_COOLDOWN;
    // Muzzle flash
    spawnParticles(tipX, tipY, 3, COL.bullet, 40, 1);
  }
}

function updateBullets(dt) {
  for (const b of bullets) {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < -10 || b.x > W + 10 || b.y < -10 || b.y > H + 10) {
      b.alive = false;
    }
  }
  bullets = bullets.filter(b => b.alive);
}

function updateSpawning(dt) {
  if (enemiesToSpawn <= 0) return;
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    const types = levelConfig.types;
    const type = types[randInt(0, types.length - 1)];
    enemies.push(createEnemy(type, levelConfig));
    enemiesToSpawn--;
    spawnTimer = levelConfig.spawnInterval;
  }
}

function updateEnemies(dt) {
  for (const e of enemies) {
    // Gentle homing toward player
    const targetAngle = Math.atan2(player.y - e.y, player.x - e.x);
    const turnRate = e.type === 'tank' ? 0.8 : e.type === 'fast' ? 2.5 : 1.5;
    let angleDiff = targetAngle - Math.atan2(e.vy, e.vx);
    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
    const currentAngle = Math.atan2(e.vy, e.vx) + angleDiff * turnRate * dt;
    e.vx = Math.cos(currentAngle) * e.speed;
    e.vy = Math.sin(currentAngle) * e.speed;
    e.angle = currentAngle;

    e.x += e.vx * dt;
    e.y += e.vy * dt;
    if (e.flashTimer > 0) e.flashTimer -= dt;
  }
}

function handleCollisions() {
  // Bullets vs enemies
  for (const b of bullets) {
    if (!b.alive) continue;
    for (const e of enemies) {
      if (!e.alive) continue;
      if (dist(b, e) < e.radius + b.radius) {
        b.alive = false;
        e.hp--;
        e.flashTimer = 0.1;
        spawnParticles(b.x, b.y, 4, COL.bullet, 50, 1);
        if (e.hp <= 0) {
          e.alive = false;
          score += e.scoreVal;
          const col = e.type === 'fast' ? COL.enemyFast :
                      e.type === 'tank' ? COL.enemyTankArmor : COL.enemyBasicLight;
          spawnParticles(e.x, e.y, 10, col, 70, 2);
          spawnParticles(e.x, e.y, 6, '#fff', 50, 1);
        }
        break;
      }
    }
  }
  bullets = bullets.filter(b => b.alive);
  enemies = enemies.filter(e => e.alive);

  // Enemies vs player
  if (player.invuln > 0) return;
  for (const e of enemies) {
    if (dist(player, e) < e.radius + 5) {
      player.hp--;
      player.invuln = INVULN_TIME;
      screenShake = 3;
      e.alive = false;
      enemies = enemies.filter(en => en.alive);
      spawnParticles(player.x, player.y, 8, '#fff', 60, 1);
      spawnParticles(player.x, player.y, 5, COL.hpBar, 50, 2);
      break;
    }
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) p.alive = false;
  }
  particles = particles.filter(p => p.alive);
}

// === SECTION H: RENDER LOGIC ===
function render() {
  ctx.save();

  // Screen shake
  if (screenShake > 0) {
    ctx.translate(rand(-screenShake, screenShake), rand(-screenShake, screenShake));
  }

  // Background
  ctx.fillStyle = COL.bg;
  ctx.fillRect(-5, -5, W + 10, H + 10);

  if (gameState === 'MENU') { renderMenu(); ctx.restore(); return; }

  // Grid
  renderBackground();

  // Entities
  for (const p of particles) drawParticle(p);
  for (const b of bullets) drawBullet(b);
  for (const e of enemies) {
    if (e.type === 'fast') drawEnemyFast(e);
    else if (e.type === 'tank') drawEnemyTank(e);
    else drawEnemyBasic(e);
  }
  if (player && player.hp > 0) drawPlayer(player);

  // HUD
  renderHUD();

  // Wave overlays
  if (waveState === 'WAVE_INTRO' && gameState === 'PLAYING') renderWaveIntro();
  if (waveState === 'WAVE_CLEAR' && gameState === 'PLAYING') renderWaveClear();
  if (gameState === 'GAME_OVER') renderGameOver();

  ctx.restore();
}

function renderBackground() {
  ctx.strokeStyle = COL.grid;
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 16) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 16) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
}

function renderHUD() {
  // Health bar
  const bw = 50, bh = 5, bx = 6, by = 6;
  ctx.fillStyle = COL.hpBarBg;
  ctx.fillRect(bx, by, bw, bh);
  ctx.fillStyle = COL.hpBar;
  ctx.fillRect(bx, by, bw * (player.hp / PLAYER_MAX_HP), bh);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 0.5;
  ctx.strokeRect(bx, by, bw, bh);

  // HP label
  ctx.fillStyle = COL.text;
  ctx.font = '5px monospace';
  ctx.textAlign = 'left';
  ctx.fillText('HP', bx, by + bh + 6);

  // Cooldown bar
  const cdY = by + bh + 2;
  ctx.fillStyle = '#222';
  ctx.fillRect(bx, cdY, 30, 2);
  ctx.fillStyle = COL.cooldownBar;
  const cdRatio = 1 - fireCooldown / FIRE_COOLDOWN;
  ctx.fillRect(bx, cdY, 30 * cdRatio, 2);

  // Score
  ctx.fillStyle = COL.gold;
  ctx.font = '7px monospace';
  ctx.textAlign = 'right';
  ctx.fillText(score.toString().padStart(6, '0'), W - 6, 12);

  // Level
  ctx.fillStyle = COL.text;
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + level, W / 2, 12);
}

function renderMenu() {
  // Animated background
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, W, H);
  renderBackground();

  // Decorative floating enemies
  for (let i = 0; i < 5; i++) {
    const t = menuTime * 0.3 + i * 1.3;
    const ex = W * 0.2 + Math.sin(t * 0.7 + i) * W * 0.3;
    const ey = H * 0.2 + Math.cos(t * 0.5 + i * 2) * H * 0.25;
    ctx.globalAlpha = 0.2;
    ctx.save();
    ctx.translate(ex, ey);
    ctx.rotate(t);
    ctx.fillStyle = COL.enemyBasic;
    ctx.fillRect(-4, -4, 8, 8);
    ctx.restore();
    ctx.globalAlpha = 1;
  }

  // Title
  ctx.fillStyle = COL.gold;
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('RETRO', W / 2, H * 0.3);
  ctx.fillStyle = COL.hpBar;
  ctx.fillText('BLASTER', W / 2, H * 0.3 + 22);

  // Subtitle
  ctx.fillStyle = COL.accent;
  ctx.font = '6px monospace';
  ctx.fillText('TOP-DOWN SHOOTER', W / 2, H * 0.3 + 34);

  // Blink "Click to start"
  if (Math.floor(menuTime * 2) % 2 === 0) {
    ctx.fillStyle = COL.text;
    ctx.font = '7px monospace';
    ctx.fillText('CLICK TO START', W / 2, H * 0.65);
  }

  // Instructions
  ctx.fillStyle = COL.textDim;
  ctx.font = '5px monospace';
  ctx.fillText('WASD / ARROWS to move', W / 2, H * 0.78);
  ctx.fillText('MOUSE to aim, CLICK to shoot', W / 2, H * 0.78 + 9);

  // High score
  if (highScore > 0) {
    ctx.fillStyle = COL.gold;
    ctx.font = '5px monospace';
    ctx.fillText('HIGH SCORE: ' + highScore, W / 2, H * 0.93);
  }
}

function renderWaveIntro() {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, 0, W, H);

  const progress = 1 - waveTimer / WAVE_INTRO_DUR;
  const scale = progress < 0.3 ? progress / 0.3 : 1;

  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(scale, scale);
  ctx.fillStyle = COL.gold;
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('LEVEL ' + level, 0, 0);
  ctx.fillStyle = COL.textDim;
  ctx.font = '6px monospace';
  const cfg = getLevelConfig(level);
  ctx.fillText(cfg.enemyCount + ' enemies', 0, 14);
  ctx.restore();
}

function renderWaveClear() {
  ctx.fillStyle = COL.gold;
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('WAVE CLEAR!', W / 2, H / 2 - 5);
  ctx.fillStyle = COL.text;
  ctx.font = '6px monospace';
  ctx.fillText('+' + (level * 500) + ' BONUS', W / 2, H / 2 + 8);
}

function renderGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = COL.hpBar;
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GAME OVER', W / 2, H * 0.35);

  ctx.fillStyle = COL.text;
  ctx.font = '8px monospace';
  ctx.fillText('SCORE: ' + score, W / 2, H * 0.48);

  ctx.fillStyle = COL.gold;
  ctx.font = '7px monospace';
  ctx.fillText('LEVEL ' + level, W / 2, H * 0.56);

  if (score >= highScore && highScore > 0) {
    ctx.fillStyle = COL.gold;
    ctx.font = '6px monospace';
    ctx.fillText('NEW HIGH SCORE!', W / 2, H * 0.64);
  }

  if (Math.floor(menuTime * 2) % 2 === 0) {
    ctx.fillStyle = COL.textDim;
    ctx.font = '6px monospace';
    ctx.fillText('CLICK TO RESTART', W / 2, H * 0.78);
  }
}

// === SECTION I: GAME MANAGEMENT ===
function startGame() {
  gameState = 'PLAYING';
  waveState = 'WAVE_INTRO';
  level = 1;
  score = 0;
  waveTimer = WAVE_INTRO_DUR;
  screenShake = 0;
  player = createPlayer();
  bullets = [];
  enemies = [];
  particles = [];
  fireCooldown = 0;
}

// === SECTION J: GAME LOOP & INIT ===
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  render();
  requestAnimationFrame(gameLoop);
}

requestAnimationFrame(gameLoop);
</script>
</body>
