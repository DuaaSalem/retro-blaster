<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tic Tac Toe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', sans-serif;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    color: #fff;
  }
  .container { text-align: center; }
  h1 { font-size: 2.5rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
  #status {
    font-size: 1.3rem; margin-bottom: 1.5rem; min-height: 2rem;
    color: #a78bfa;
  }
  .board {
    display: grid; grid-template-columns: repeat(3, 120px); gap: 8px;
    justify-content: center; margin-bottom: 1.5rem;
  }
  .cell {
    width: 120px; height: 120px; background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15); border-radius: 12px;
    font-size: 3rem; font-weight: 700; color: #fff;
    cursor: pointer; transition: background 0.2s, transform 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .cell:hover:not(.taken) {
    background: rgba(255,255,255,0.15); transform: scale(1.05);
  }
  .cell.x { color: #60a5fa; }
  .cell.o { color: #f472b6; }
  .cell.win { background: rgba(167,139,250,0.3); border-color: #a78bfa; }
  button {
    padding: 0.7rem 2rem; font-size: 1rem; border: none; border-radius: 8px;
    background: #7c3aed; color: #fff; cursor: pointer; font-weight: 600;
    transition: background 0.2s;
  }
  button:hover { background: #6d28d9; }
  .score {
    display: flex; justify-content: center; gap: 2rem;
    margin-bottom: 1.5rem; font-size: 1.1rem;
  }
  .score span { opacity: 0.8; }
  .score .val { font-weight: 700; opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <h1>Tic Tac Toe</h1>
  <div class="score">
    <div><span>You (X): </span><span class="val" id="scoreX">0</span></div>
    <div><span>AI (O): </span><span class="val" id="scoreO">0</span></div>
    <div><span>Draws: </span><span class="val" id="scoreD">0</span></div>
  </div>
  <div id="status">Your turn!</div>
  <div class="board" id="board"></div>
  <button onclick="resetGame()">New Game</button>
</div>
<script>
const board = document.getElementById('board');
const statusEl = document.getElementById('status');
let cells, state, gameOver;
let scores = { X: 0, O: 0, D: 0 };

const WINS = [
  [0,1,2],[3,4,5],[6,7,8],
  [0,3,6],[1,4,7],[2,5,8],
  [0,4,8],[2,4,6]
];

function init() {
  board.innerHTML = '';
  state = Array(9).fill('');
  gameOver = false;
  statusEl.textContent = 'Your turn!';
  cells = [];
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.addEventListener('click', () => play(i));
    board.appendChild(cell);
    cells.push(cell);
  }
}

function play(i) {
  if (gameOver || state[i]) return;
  makeMove(i, 'X');
  if (gameOver) return;
  if (state.includes('')) {
    setTimeout(aiMove, 300);
  }
}

function makeMove(i, mark) {
  state[i] = mark;
  cells[i].textContent = mark;
  cells[i].classList.add('taken', mark.toLowerCase());
  const win = checkWin(mark);
  if (win) {
    gameOver = true;
    win.forEach(j => cells[j].classList.add('win'));
    if (mark === 'X') {
      statusEl.textContent = 'You win!';
      scores.X++;
    } else {
      statusEl.textContent = 'AI wins!';
      scores.O++;
    }
    updateScores();
  } else if (!state.includes('')) {
    gameOver = true;
    statusEl.textContent = "It's a draw!";
    scores.D++;
    updateScores();
  } else {
    statusEl.textContent = mark === 'X' ? "AI thinking..." : "Your turn!";
  }
}

function checkWin(mark) {
  for (const combo of WINS) {
    if (combo.every(i => state[i] === mark)) return combo;
  }
  return null;
}

function aiMove() {
  const best = minimax(state, 'O');
  makeMove(best.index, 'O');
}

function minimax(board, player) {
  const empty = board.map((v, i) => v === '' ? i : null).filter(v => v !== null);
  if (checkWinState(board, 'X')) return { score: -10 };
  if (checkWinState(board, 'O')) return { score: 10 };
  if (empty.length === 0) return { score: 0 };

  const moves = [];
  for (const i of empty) {
    const move = { index: i };
    board[i] = player;
    const result = minimax(board, player === 'O' ? 'X' : 'O');
    move.score = result.score;
    board[i] = '';
    moves.push(move);
  }

  let best;
  if (player === 'O') {
    let bestScore = -Infinity;
    for (const m of moves) { if (m.score > bestScore) { bestScore = m.score; best = m; } }
  } else {
    let bestScore = Infinity;
    for (const m of moves) { if (m.score < bestScore) { bestScore = m.score; best = m; } }
  }
  return best;
}

function checkWinState(b, mark) {
  return WINS.some(c => c.every(i => b[i] === mark));
}

function updateScores() {
  document.getElementById('scoreX').textContent = scores.X;
  document.getElementById('scoreO').textContent = scores.O;
  document.getElementById('scoreD').textContent = scores.D;
}

function resetGame() { init(); }
init();
</script>
</body>
</html>
